      ],
      contactTitle: "Liên hệ",
      contactText: "Nếu bạn có câu hỏi về các điều khoản này, hãy liên hệ với quản trị viên dịch vụ: tkolymp.cz/kontakt",
      breadcrumbHome: "Trang chủ",
    },
  };

  const LANG_NAMES = { en: "English", cs: "Česky", de: "Deutsch", sk: "Slovensky", sl: "Slovenščina", uk: "Українська", vi: "Tiếng Việt" };

  function detectLang() {
    const p = new URLSearchParams(window.location.search).get('lang');
    if (p && CONTENT[p]) return p;
    const stored = localStorage.getItem('tkolymp-lang');
    if (stored && CONTENT[stored]) return stored;
    const bl = (navigator.language || 'en').split('-')[0];
    const mapped = bl === 'ua' ? 'uk' : bl;
    return CONTENT[mapped] ? mapped : 'en';
  }

  function applyLang(lang) {
    localStorage.setItem('tkolymp-lang', lang);
    const C = CONTENT[lang];

    document.getElementById('breadcrumbHome').textContent = C.breadcrumbHome;
    document.getElementById('breadcrumbCurrent').textContent = C.pageTitle;
    document.getElementById('pageTitle').textContent = C.pageTitle;
    document.getElementById('effectiveDate').textContent = C.effectiveDate;
    document.getElementById('summaryTitle').textContent = C.summaryTitle;
    document.getElementById('summaryText').textContent = C.summaryText;
    document.getElementById('contactTitle').textContent = C.contactTitle;
    document.getElementById('contactText').textContent = C.contactText;

    const privacyLabels = { en: "Privacy Policy", cs: "Zásady ochrany osobních údajů", de: "Datenschutzrichtlinie", sk: "Zásady ochrany osobných údajov", sl: "Politika zasebnosti", uk: "Політика конфіденційності", vi: "Chính sách bảo mật" };
    document.getElementById('footerPrivacy').textContent = privacyLabels[lang] || "Privacy Policy";
    document.getElementById('footerTerms').textContent = C.pageTitle;
    document.getElementById('footerPrivacy').href = `../privacy/?lang=${lang}`;
    document.getElementById('footerTerms').href = `../terms/?lang=${lang}`;
    document.getElementById('breadcrumbHome').href = `../?lang=${lang}`;
    document.title = `${C.pageTitle} – TK Olymp`;

    const container = document.getElementById('sections');
    container.innerHTML = '';
    C.sections.forEach(sec => {
      const div = document.createElement('div');
      div.className = 'doc-section';
      const h2 = document.createElement('h2');
      h2.className = 'section-title';
      h2.textContent = sec.title;
      div.appendChild(h2);
      const body = document.createElement('div');
      body.className = 'section-body';
      sec.body.forEach(line => {
        const p = document.createElement('p');
        p.textContent = line;
        body.appendChild(p);
      });
      div.appendChild(body);
      container.appendChild(div);
    });

    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    const url = new URL(window.location);
    url.searchParams.set('lang', lang);
    history.replaceState({}, '', url);
  }

  const switcher = document.getElementById('langSwitcher');
  Object.entries(LANG_NAMES).forEach(([code, name]) => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.dataset.lang = code;
    btn.textContent = name;
    btn.onclick = () => applyLang(code);
    switcher.appendChild(btn);
  });

  applyLang(detectLang());
  </script>
</body>
</html>
