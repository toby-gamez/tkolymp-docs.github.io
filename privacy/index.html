        { title: "7) Ваші права", body: ["Ви маєте право запитувати доступ до своїх даних, їх виправлення або видалення. Для таких запитів зверніться до адміністратора сервісу або скористайтеся контактними каналами постачальника API."] },

      sections: [
        { title: "1) Dữ liệu chúng tôi thu thập", body: ["• Mã thông báo xác thực (JWT): được lưu trữ cục bộ trong bộ nhớ an toàn của thiết bị để ủy quyền các lệnh gọi API.", "• Dữ liệu từ API: sự kiện, phiên bản, thông báo, giải đấu, thông tin người dùng/nhóm và bảng xếp hạng — được tải động từ GraphQL API dựa trên đăng nhập của bạn.", "• Dữ liệu tùy chọn: nếu bạn điền thông tin hồ sơ hoặc thay đổi cài đặt trong ứng dụng, chúng sẽ được sử dụng để cải thiện trải nghiệm người dùng."] },
        { title: "2) Dữ liệu được lưu trữ ở đâu và như thế nào", body: ["• Các yêu cầu mạng đến api.rozpisovnik.cz/graphql. Ứng dụng không duy trì kho lưu trữ dữ liệu trung tâm riêng bên ngoài nhà cung cấp API.", "• JWT được lưu trong SecureStorage (bộ nhớ an toàn của nền tảng). Để hỗ trợ sử dụng ngoại tuyến, ứng dụng cũng lưu trữ cục bộ trên thiết bị của bạn các sự kiện, thông báo và dữ liệu API khác; bộ nhớ đệm này sẽ bị xóa khi bạn đăng xuất."] },
        { title: "3) Mục đích xử lý", body: ["Chúng tôi sử dụng dữ liệu để: xác thực, ủy quyền, hiển thị sự kiện của bạn, gửi và nhận thông báo, quản lý bảng xếp hạng và các tính năng khác mà bạn mong đợi từ khách hàng dịch vụ."] },
        { title: "4) Chia sẻ và xử lý bởi bên thứ ba", body: ["• Chúng tôi không bán hoặc chia sẻ dữ liệu với bên thứ ba cho mục đích tiếp thị mà không có sự đồng ý của bạn. Chúng tôi chỉ chia sẻ dữ liệu với nhà cung cấp API và các dịch vụ hệ thống cần thiết (ví dụ: bản đồ), nếu bạn sử dụng chúng.", "• Thông báo đẩy được gửi qua Google Firebase Cloud Messaging, và ứng dụng sử dụng Google Firebase Analytics để thống kê sử dụng cơ bản, tổng hợp. Google xử lý dữ liệu liên quan đến các dịch vụ này theo chính sách bảo mật riêng của họ (policies.google.com/privacy)."] },

        { title: "6) Thời gian lưu trữ dữ liệu", body: ["JWT được lưu trữ trong thời hạn hiệu lực của token hoặc cho đến khi bạn đăng xuất/xóa tài khoản. Dữ liệu API được lưu trữ cục bộ (sự kiện, thông báo, v.v.) được giữ lại để truy cập ngoại tuyến và bị xóa khi bạn đăng xuất. Dữ liệu phía API được điều chỉnh bởi các quy tắc của nhà cung cấp API."] },

        { title: "8) Thay đổi chính sách", body: ["Chính sách có thể được cập nhật. Chúng tôi khuyến nghị bạn thỉnh thoảng kiểm tra ngày có hiệu lực."] },

      contactTitle: "Liên hệ",

      breadcrumbHome: "Trang chủ",

  const LANG_NAMES = { en: "English", cs: "Česky", de: "Deutsch", sk: "Slovensky", sl: "Slovenščina", uk: "Українська", vi: "Tiếng Việt" };

  function detectLang() {
    const p = new URLSearchParams(window.location.search).get('lang');
    if (p && CONTENT[p]) return p;
    const stored = localStorage.getItem('tkolymp-lang');
    if (stored && CONTENT[stored]) return stored;
    const bl = (navigator.language || 'en').split('-')[0];
    const mapped = bl === 'ua' ? 'uk' : bl;
    return CONTENT[mapped] ? mapped : 'en';
  }

  function applyLang(lang) {
    localStorage.setItem('tkolymp-lang', lang);
    const C = CONTENT[lang];

    document.getElementById('breadcrumbHome').textContent = C.breadcrumbHome;
    document.getElementById('breadcrumbCurrent').textContent = C.pageTitle;
    document.getElementById('pageTitle').textContent = C.pageTitle;
    document.getElementById('effectiveDate').textContent = C.effectiveDate;
    document.getElementById('summaryTitle').textContent = C.summaryTitle;
    document.getElementById('summaryText').textContent = C.summaryText;
    document.getElementById('contactTitle').textContent = C.contactTitle;
    document.getElementById('contactText').textContent = C.contactText;
    document.getElementById('technicalNote').textContent = C.technicalNote;
    document.getElementById('footerPrivacy').textContent = C.pageTitle;
    document.getElementById('footerTerms').textContent = lang === 'en' ? 'Terms of Use' : (CONTENT[lang] ? C.pageTitle === C.pageTitle : '');

    // Footer terms label per lang
    const termsLabels = { en: "Terms of Use", cs: "Podmínky používání", de: "Nutzungsbedingungen", sk: "Podmienky používania", sl: "Pogoji uporabe", uk: "Умови використання", vi: "Điều khoản sử dụng" };
    document.getElementById('footerTerms').textContent = termsLabels[lang] || "Terms of Use";

    document.getElementById('footerPrivacy').href = `../privacy/?lang=${lang}`;
    document.getElementById('footerTerms').href = `../terms/?lang=${lang}`;
    document.getElementById('breadcrumbHome').href = `../?lang=${lang}`;
    document.title = `${C.pageTitle} – TK Olymp`;

    // Render sections
    const container = document.getElementById('sections');
    container.innerHTML = '';
    C.sections.forEach(sec => {
      const div = document.createElement('div');
      div.className = 'doc-section';
      const h2 = document.createElement('h2');
      h2.className = 'section-title';
      h2.textContent = sec.title;
      div.appendChild(h2);
      const body = document.createElement('div');
      body.className = 'section-body';
      sec.body.forEach(line => {
        const p = document.createElement('p');
        p.textContent = line;
        body.appendChild(p);
      });
      div.appendChild(body);
      container.appendChild(div);
    });

    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    const url = new URL(window.location);
    url.searchParams.set('lang', lang);
    history.replaceState({}, '', url);
  }

  // Build lang switcher
  const switcher = document.getElementById('langSwitcher');
  Object.entries(LANG_NAMES).forEach(([code, name]) => {
    const btn = document.createElement('button');
    btn.className = 'lang-btn';
    btn.dataset.lang = code;
    btn.textContent = name;
    btn.onclick = () => applyLang(code);
    switcher.appendChild(btn);
  });

  applyLang(detectLang());
  </script>
